<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 120" role="img" aria-labelledby="t d">
  <title id="t">klim</title>
  <desc id="d">klim wordmark — mark + Inter "lim" wordmark, cyan dot on the i. Light theme.</desc>
  <rect x="22" y="20" width="14" height="80" rx="3" fill="#0b1220"/>
  <path d="M48 28 L82 60 L48 92" fill="none" stroke="#00c8e6" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "l" + dotless "i" + "m" as type, with separate cyan dot -->
  <text x="100" y="98" font-family="Inter, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="96" font-weight="700" letter-spacing="-4" fill="#0b1220">l</text>
  <!-- dotless i stem -->
  <rect x="134.5" y="50" width="14" height="48" rx="3" fill="#0b1220"/>
  <!-- cyan dot on i -->
  <circle cx="141.5" cy="34" r="9" fill="#00c8e6"/>
  <text x="156" y="98" font-family="Inter, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
